<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Galaxy ✦ Knowledge Nebula</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#010308;
  font-family:'Inter','Segoe UI',system-ui,sans-serif;color:#fff}

/* ── NEBULA BACKGROUND ──────────────────────────────────────── */
#nebula{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 18% 75%, rgba(128,82,255,.22) 0%,transparent 58%),
    radial-gradient(ellipse 60% 80% at 82% 22%, rgba(0,212,255,.15) 0%,transparent 58%),
    radial-gradient(ellipse 70% 50% at 58% 88%, rgba(255,107,138,.11) 0%,transparent 58%),
    radial-gradient(ellipse 50% 65% at 38% 8%,  rgba(255,184,41,.07) 0%,transparent 58%),
    radial-gradient(ellipse 40% 40% at 75% 65%, rgba(21,232,160,.07) 0%,transparent 58%),
    #010308;
  filter:blur(55px);
  animation:nebDrift 22s ease-in-out infinite alternate;
}
@keyframes nebDrift{
  0%  {opacity:.65;transform:scale(1)   rotate(0deg)}
  50% {opacity:.92;transform:scale(1.07)rotate(.9deg)}
  100%{opacity:.72;transform:scale(1.03)rotate(-.6deg)}
}

/* ── CANVAS LAYER ───────────────────────────────────────────── */
#c{position:fixed;inset:0;z-index:1}

/* ── FLOATING CSS LABELS ────────────────────────────────────── */
#labels{position:fixed;inset:0;z-index:3;pointer-events:none}
.lbl{
  position:absolute;pointer-events:all;
  transform:translate(-50%,calc(-100% - 14px));
  background:rgba(4,6,18,.78);backdrop-filter:blur(14px) saturate(1.4);
  border:1px solid rgba(255,255,255,.1);border-radius:12px;
  padding:7px 14px 8px;cursor:pointer;text-align:center;min-width:96px;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),
             box-shadow .22s ease,border-color .22s ease;
}
.lbl:hover{
  transform:translate(-50%,calc(-100% - 18px)) scale(1.06);
  box-shadow:0 8px 30px rgba(0,0,0,.5);
}
.lbl-name{font-size:11px;font-weight:700;letter-spacing:.03em}
.lbl-pct{font-size:10px;font-weight:500;opacity:.7;margin-top:1px}
.lbl-bar{height:2px;background:rgba(255,255,255,.1);border-radius:1px;margin-top:6px;overflow:hidden}
.lbl-fill{height:100%;border-radius:1px}

/* ── TOP HUD ────────────────────────────────────────────────── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;padding:14px 20px;gap:10px;
  background:linear-gradient(180deg,rgba(1,3,8,.85) 0%,transparent 100%);
  pointer-events:none;
}
.hd-logo{display:flex;align-items:center;gap:9px;pointer-events:all;text-decoration:none}
.hd-gem{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#8052ff,#00d4ff);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 0 20px rgba(128,82,255,.45);
}
.hd-logo-txt{font-size:15px;font-weight:800;letter-spacing:-.01em}
.hd-logo-sub{font-size:9px;color:rgba(255,255,255,.35);font-weight:500;letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
.hd-sp{flex:1}
.hd-pills{display:flex;gap:7px;pointer-events:all}
.pill{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.05);backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.1);border-radius:9999px;
  color:rgba(255,255,255,.65);padding:7px 16px;cursor:pointer;
  font-size:11px;font-weight:500;font-family:inherit;text-decoration:none;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.pill:hover{background:rgba(255,255,255,.11);color:#fff;border-color:rgba(255,255,255,.2);transform:translateY(-2px)}
.pill:active{transform:scale(.96)}

/* ── TOOLTIP ────────────────────────────────────────────────── */
#tt{
  position:fixed;pointer-events:none;z-index:25;
  opacity:0;transition:opacity .18s ease;
  transform:translate(-50%,-145%);
  background:rgba(6,10,25,.92);backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.13);border-radius:16px;
  padding:12px 18px;min-width:140px;text-align:center;
  box-shadow:0 16px 50px rgba(0,0,0,.55);
}
#tt.on{opacity:1}
#tt-sym{font-size:26px;margin-bottom:5px;display:block}
#tt-name{font-size:13px;font-weight:700;display:block}
#tt-pct{font-size:11px;display:block;margin-top:3px;opacity:.7}
#tt-hint{font-size:9px;color:rgba(255,255,255,.28);margin-top:8px;display:block;letter-spacing:.04em}

/* ── RIGHT PANEL ────────────────────────────────────────────── */
#pan{
  position:fixed;right:0;top:0;bottom:0;width:300px;z-index:30;
  background:rgba(4,7,20,.96);backdrop-filter:blur(30px);
  border-left:1px solid rgba(255,255,255,.07);
  transform:translateX(100%);transition:transform .38s cubic-bezier(0,.9,.2,1);
  display:flex;flex-direction:column;
}
#pan.open{transform:translateX(0)}
#pan-accent{height:3px}
.pan-hdr{padding:24px 22px 18px}
.pan-sym{font-size:34px;margin-bottom:9px;display:block}
.pan-name{font-size:22px;font-weight:800;letter-spacing:-.02em}
.pan-meta{font-size:11px;color:rgba(255,255,255,.38);margin-top:4px}
.pan-x{
  position:absolute;top:20px;right:18px;width:30px;height:30px;
  background:rgba(255,255,255,.07);border:none;border-radius:50%;
  color:rgba(255,255,255,.55);font-size:14px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;
}
.pan-x:hover{background:rgba(255,255,255,.14);color:#fff}
.pan-body{flex:1;overflow-y:auto;padding:0 22px 22px;scrollbar-width:none}
.pan-body::-webkit-scrollbar{display:none}
.sec-lbl{
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:rgba(255,255,255,.28);
  margin-bottom:8px;margin-top:22px;
}
.prog-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:20px}
.prog-bar{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:12px;padding:14px;text-align:center;
}
.stat-n{font-size:26px;font-weight:800;letter-spacing:-.03em}
.stat-l{font-size:9px;color:rgba(255,255,255,.32);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px}
.chip{
  padding:5px 11px;border-radius:9999px;font-size:11px;font-weight:600;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1);cursor:default;
}
.chip:hover{transform:translateY(-2px) scale(1.06)}
.btn-go{
  width:100%;padding:13px;border-radius:12px;border:none;font-family:inherit;
  font-size:14px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.01em;
  transition:all .22s cubic-bezier(.34,1.56,.64,1);
}
.btn-go:hover{transform:translateY(-2px);filter:brightness(1.15);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.btn-go:active{transform:scale(.97)}

/* ── CONTEXT MENU ───────────────────────────────────────────── */
#ctx{
  position:fixed;z-index:40;
  background:rgba(8,12,30,.97);backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.14);border-radius:14px;
  padding:6px;min-width:158px;box-shadow:0 20px 60px rgba(0,0,0,.65);
  opacity:0;pointer-events:none;
  transform:scale(.88) translateY(-8px);
  transition:all .16s cubic-bezier(.34,1.56,.64,1);
}
#ctx.open{opacity:1;pointer-events:all;transform:scale(1) translateY(0)}
.ctx-r{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;
  cursor:pointer;font-size:12px;color:rgba(255,255,255,.82);transition:background .1s ease}
.ctx-r:hover{background:rgba(128,82,255,.22);color:#fff}
.ctx-sep{height:1px;background:rgba(255,255,255,.07);margin:4px 0}

/* ── HINT BAR ───────────────────────────────────────────────── */
#hints{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:14px;
  background:rgba(1,3,8,.72);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.07);border-radius:9999px;
  padding:9px 22px;pointer-events:none;
}
.hk{font-size:10px;color:rgba(255,255,255,.38);display:flex;align-items:center;gap:5px}
.hk kbd{background:rgba(255,255,255,.09);color:rgba(255,255,255,.55);
  border-radius:4px;padding:1px 6px;font-family:inherit;font-size:9px}

/* ── LOADING ────────────────────────────────────────────────── */
#loading{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
  background:radial-gradient(ellipse 80% 60% at 50% 50%, rgba(128,82,255,.15) 0%, #010308 65%);
  transition:opacity .9s ease;
}
#loading.out{opacity:0;pointer-events:none}
.ld-gem{
  width:70px;height:70px;border-radius:20px;
  background:linear-gradient(135deg,#8052ff,#00d4ff);
  display:flex;align-items:center;justify-content:center;font-size:30px;
  animation:ldPulse 1.8s ease-in-out infinite;
  box-shadow:0 0 0 0 rgba(128,82,255,.6);
}
@keyframes ldPulse{
  0%,100%{box-shadow:0 0 30px rgba(128,82,255,.4),0 0 0 0 rgba(128,82,255,.3)}
  50%{box-shadow:0 0 70px rgba(128,82,255,.8),0 0 40px rgba(0,212,255,.3),0 0 80px 6px rgba(128,82,255,.15)}
}
.ld-title{font-size:20px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
.ld-sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.08em}
.ld-bar{width:220px;height:2px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,#8052ff,#00d4ff,#15e8a0);
  animation:ldFill 2.2s cubic-bezier(.4,0,.2,1) forwards}
@keyframes ldFill{from{width:0}to{width:100%}}
</style>
</head>
<body>

<div id="nebula"></div>
<div id="labels"></div>
<div id="c"></div>

<!-- TOOLTIP -->
<div id="tt">
  <span id="tt-sym">∑</span>
  <span id="tt-name">Mathematics</span>
  <span id="tt-pct">65% mastered · 6 topics</span>
  <span id="tt-hint">CLICK TO EXPLORE · RIGHT-CLICK FOR MENU</span>
</div>

<!-- HUD -->
<div id="hud">
  <a href="index.html" class="hd-logo">
    <div class="hd-gem">✦</div>
    <div>
      <div class="hd-logo-txt">Study Galaxy</div>
      <div class="hd-logo-sub">Knowledge Nebula</div>
    </div>
  </a>
  <div class="hd-sp"></div>
  <div class="hd-pills">
    <button class="pill" onclick="toggleRot()">⟳ Auto-Rotate</button>
    <button class="pill" onclick="resetCam()">⊙ Reset</button>
    <a href="index.html" class="pill">← StudyOS</a>
  </div>
</div>

<!-- PANEL -->
<div id="pan">
  <div id="pan-accent"></div>
  <button class="pan-x" onclick="closePan()">✕</button>
  <div class="pan-hdr">
    <span class="pan-sym" id="p-sym">∑</span>
    <div class="pan-name" id="p-name">Mathematics</div>
    <div class="pan-meta" id="p-meta">6 topics · 65% mastered</div>
  </div>
  <div class="pan-body">
    <div class="sec-lbl">Mastery</div>
    <div class="prog-track"><div class="prog-bar" id="p-bar"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="p-pct">65%</div><div class="stat-l">Mastered</div></div>
      <div class="stat"><div class="stat-n" id="p-top">6</div><div class="stat-l">Topics</div></div>
    </div>
    <div class="sec-lbl">Topics</div>
    <div class="chips" id="p-chips"></div>
    <button class="btn-go" id="p-go" onclick="location.href='index.html'">Open in StudyOS →</button>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx"></div>

<!-- HINTS -->
<div id="hints">
  <div class="hk"><kbd>Drag</kbd> Rotate</div>
  <div class="hk"><kbd>Scroll</kbd> Zoom</div>
  <div class="hk"><kbd>Click</kbd> Select</div>
  <div class="hk"><kbd>R</kbd> Reset</div>
  <div class="hk"><kbd>Esc</kbd> Close</div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="ld-gem">🌌</div>
  <div class="ld-title">Study Galaxy</div>
  <div class="ld-sub">Mapping your Knowledge Nebula…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── DATA — reads real progress from StudyOS localStorage ──────────
function getProgress(){
  try{const db=JSON.parse(localStorage.getItem('studyos_v1')||'{}');return db.subProgress||db.subs||null}catch{return null}
}
const _pr=getProgress();
const _p=id=>(_pr&&(_pr[id]!==undefined?_pr[id]:(_pr.find&&_pr.find(x=>x.id===id)?.p)))||null;

const SUBS=[
  {id:'m',name:'Mathematics',sym:'∑',hex:'#8052ff',col:0x8052ff,orbit:11,spd:.009, tilt:8,   ph:0,    prog:_p('m')??65,
   topics:['Calculus','Algebra','Trigonometry','Statistics','Coord. Geometry','Vectors']},
  {id:'p',name:'Physics',    sym:'φ',hex:'#00d4ff',col:0x00d4ff,orbit:16,spd:.006, tilt:30,  ph:1.05, prog:_p('p')??48,
   topics:['Mechanics','Thermodynamics','Electromagnetism','Optics','Modern Physics','Waves']},
  {id:'c',name:'Chemistry',  sym:'⚗',hex:'#ffb829',col:0xffb829,orbit:13,spd:.008, tilt:-22, ph:2.1,  prog:_p('c')??62,
   topics:['Organic','Inorganic','Physical','Analytical','Electrochemistry','Bonding']},
  {id:'b',name:'Biology',    sym:'⬡',hex:'#15e8a0',col:0x15e8a0,orbit:20,spd:.005, tilt:44,  ph:3.14, prog:_p('b')??30,
   topics:['Cell Biology','Genetics','Ecology','Evolution','Physiology','Biotechnology']},
  {id:'e',name:'English',    sym:'A', hex:'#b8b8ff',col:0xb8b8ff,orbit:17,spd:.007, tilt:-48, ph:4.2,  prog:_p('e')??80,
   topics:['Grammar','Literature','Writing','Comprehension','Vocabulary','Critical Thinking']},
  {id:'h',name:'History',    sym:'⚔',hex:'#ff6b8a',col:0xff6b8a,orbit:22,spd:.004, tilt:58,  ph:5.25, prog:_p('h')??45,
   topics:['Ancient','Medieval','Modern History','World Wars','Independence','Contemporary']},
];
const CONNS=[[0,1],[1,2],[0,2],[2,3],[0,3],[1,4],[3,5]];

// ── THREE.JS SCENE ───────────────────────────────────────────────
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x010308,.0055);

const cam=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,1000);
cam.position.set(0,8,40);cam.lookAt(0,0,0);

const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.5;
renderer.setClearColor(0x000000,0);
const rc=renderer.domElement;
rc.style.cssText='position:fixed;inset:0;z-index:2';
document.getElementById('c').replaceWith(rc);

const pivot=new THREE.Group();
scene.add(pivot);

// ── LIGHTS ───────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0a0a33,2.5));
const corePt=new THREE.PointLight(0xffffff,12,55);scene.add(corePt);
const rimA=new THREE.DirectionalLight(0x8052ff,2.8);rimA.position.set(-28,18,-12);scene.add(rimA);
const rimB=new THREE.DirectionalLight(0x00d4ff,2.0);rimB.position.set(28,-6,18);scene.add(rimB);
const rimC=new THREE.DirectionalLight(0x15e8a0,0.8);rimC.position.set(0,-20,0);scene.add(rimC);

// ── STARS (5 depth layers) ───────────────────────────────────────
function mkStars(n,r0,r1,col,sz,op){
  const g=new THREE.BufferGeometry();
  const p=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r=r0+Math.random()*(r1-r0),th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    p[i*3]=r*Math.sin(ph)*Math.cos(th);p[i*3+1]=r*Math.sin(ph)*Math.sin(th);p[i*3+2]=r*Math.cos(ph);
  }
  g.setAttribute('position',new THREE.BufferAttribute(p,3));
  return new THREE.Points(g,new THREE.PointsMaterial({color:col,size:sz,sizeAttenuation:true,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false}));
}
scene.add(mkStars(9000,150,600,0xffffff,.14,.85));
scene.add(mkStars(3500, 70,220,0xaaaaff,.24,.5));
scene.add(mkStars(1500, 40,110,0x6655dd,.36,.3));
scene.add(mkStars( 500, 20, 65,0x00aaff,.44,.25));
scene.add(mkStars( 100, 15, 40,0xffffff,.9, .95)); // bright nearby

// ── CORE ─────────────────────────────────────────────────────────
const coreMesh=new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.2,5),
  new THREE.MeshStandardMaterial({color:0x5511aa,emissive:0x7022dd,emissiveIntensity:1.6,metalness:.9,roughness:.05,transparent:true,opacity:.96})
);
pivot.add(coreMesh);
const coreWire=new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.45,1),
  new THREE.MeshBasicMaterial({color:0xaa88ff,wireframe:true,transparent:true,opacity:.14})
);
pivot.add(coreWire);
// Additive corona glow (3 layers)
[5,8,12].forEach((r,i)=>{
  pivot.add(new THREE.Mesh(new THREE.SphereGeometry(r,16,16),
    new THREE.MeshBasicMaterial({color:0x8052ff,transparent:true,opacity:[.065,.032,.016][i],
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})));
});
// Orbital rings around core
[[3.1,.4,0],[4.2,1.1,1],[5.5,.7,2]].forEach(([r,rx,i])=>{
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(r,.02,7,90),
    new THREE.MeshBasicMaterial({color:[0x8052ff,0x00d4ff,0xffffff][i],transparent:true,opacity:[.38,.22,.12][i],blending:THREE.AdditiveBlending,depthWrite:false})
  );
  ring.rotation.x=rx;ring.rotation.y=[0,.5,1.2][i];
  ring.userData.rs=[.0055,-.0075,.0042][i];
  pivot.add(ring);
});

// ── ORBIT TRAILS ─────────────────────────────────────────────────
SUBS.forEach(s=>{
  const r=new THREE.Mesh(
    new THREE.TorusGeometry(s.orbit,.016,6,140),
    new THREE.MeshBasicMaterial({color:s.col,transparent:true,opacity:.07,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  r.rotation.x=s.tilt*Math.PI/180;r.rotation.z=s.ph*.3;
  pivot.add(r);
});

// ── SUBJECT ORBS ─────────────────────────────────────────────────
const orbs=[];const _v=new THREE.Vector3();const _pr2=new THREE.Vector3();

SUBS.forEach((s,i)=>{
  const g=new THREE.Group();

  // Body
  const body=new THREE.Mesh(
    new THREE.SphereGeometry(.85,32,32),
    new THREE.MeshStandardMaterial({color:s.col,emissive:s.col,emissiveIntensity:1.3,metalness:.25,roughness:.12})
  );
  g.add(body);g.userData={s,i,angle:s.ph,hovered:false,body};

  // 4-layer additive glow — fake bloom
  [[1.5,.14],[2.2,.07],[3.5,.034],[5.5,.016]].forEach(([r,op])=>{
    g.add(new THREE.Mesh(new THREE.SphereGeometry(r,14,14),
      new THREE.MeshBasicMaterial({color:s.col,transparent:true,opacity:op,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide})));
  });

  // Progress arc ring (partial torus)
  const arcAngle=Math.PI*2*(s.prog/100);
  if(arcAngle>0.01){
    const arc=new THREE.Mesh(
      new THREE.TorusGeometry(1.2,.055,8,64,arcAngle),
      new THREE.MeshBasicMaterial({color:s.col,transparent:true,opacity:.88,blending:THREE.AdditiveBlending,depthWrite:false})
    );
    arc.rotation.x=Math.PI/2;
    g.add(arc);
    // Thin full-circle background ring
    g.add(new THREE.Mesh(
      new THREE.TorusGeometry(1.2,.018,6,64),
      new THREE.MeshBasicMaterial({color:s.col,transparent:true,opacity:.12,blending:THREE.AdditiveBlending,depthWrite:false})
    ));
  }

  // Point light
  g.add(new THREE.PointLight(s.col,1.8,12));

  // Topic particle cloud
  const tp=new Float32Array(s.topics.length*6*3);
  for(let j=0;j<s.topics.length*6;j++){
    const r=1.8+Math.random()*1.1,th=Math.random()*Math.PI*2,ph2=Math.acos(2*Math.random()-1);
    tp[j*3]=r*Math.sin(ph2)*Math.cos(th);tp[j*3+1]=r*Math.sin(ph2)*Math.sin(th);tp[j*3+2]=r*Math.cos(ph2);
  }
  const tg=new THREE.BufferGeometry();tg.setAttribute('position',new THREE.BufferAttribute(tp,3));
  g.add(new THREE.Points(tg,new THREE.PointsMaterial({color:s.col,size:.08,sizeAttenuation:true,transparent:true,opacity:.45,blending:THREE.AdditiveBlending,depthWrite:false})));

  pivot.add(g);orbs.push(g);
});

// ── CSS LABELS ────────────────────────────────────────────────────
const lbls=SUBS.map((s,i)=>{
  const el=document.createElement('div');
  el.className='lbl';
  el.style.borderColor=s.hex+'28';
  el.innerHTML=`<div class="lbl-name" style="color:${s.hex}">${s.name}</div>
<div class="lbl-pct" style="color:${s.hex}">${s.prog}%</div>
<div class="lbl-bar"><div class="lbl-fill" style="width:${s.prog}%;background:${s.hex}"></div></div>`;
  el.onclick=()=>openPan(i);
  document.getElementById('labels').appendChild(el);
  return el;
});

// ── CONNECTIONS ───────────────────────────────────────────────────
const conns=CONNS.map(([a,b])=>{
  const curve=new THREE.CatmullRomCurve3([new THREE.Vector3(),new THREE.Vector3(),new THREE.Vector3()]);
  const mesh=new THREE.Mesh(
    new THREE.TubeGeometry(curve,20,.015,5,false),
    new THREE.MeshBasicMaterial({color:0x8052ff,transparent:true,opacity:.18,blending:THREE.AdditiveBlending,depthWrite:false})
  );
  pivot.add(mesh);
  return{mesh,curve,a,b};
});

// ── CAMERA SPRING ─────────────────────────────────────────────────
let camTgt={x:0,y:8,z:40},camLook=new THREE.Vector3(),camLookTgt=new THREE.Vector3();
let autoRot=true,pivY=0,pivX=0,pivTY=0,pivTX=0,zoom=40;

function flyTo(i){
  const m=orbs[i];m.getWorldPosition(_v);
  const d=_v.clone().normalize().multiplyScalar(7);
  camTgt={x:_v.x+d.x,y:_v.y+3,z:_v.z+d.z};
  camLookTgt.copy(_v);autoRot=false;
}
function resetCam(){camTgt={x:0,y:8,z:40};camLookTgt.set(0,0,0);autoRot=true;}
function toggleRot(){autoRot=!autoRot;toast(autoRot?'Auto-rotate ON':'Paused');}

function toast(msg){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:58px;left:50%;transform:translateX(-50%);background:rgba(8,12,30,.9);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.1);border-radius:9999px;padding:8px 20px;font-size:12px;color:#fff;z-index:50;pointer-events:none;transition:opacity .3s ease';
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),320)},2000);
}

// ── RAYCASTING ────────────────────────────────────────────────────
const rc2=new THREE.Raycaster();
const mouse=new THREE.Vector2(-9999,-9999);
let hov=null,sel=null;
const tt=document.getElementById('tt');

window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  tt.style.left=e.clientX+'px';tt.style.top=e.clientY+'px';
});

// ── DRAG / ZOOM ───────────────────────────────────────────────────
let drag=false,lx=0,ly=0;
rc.addEventListener('mousedown',e=>{if(e.button===0){drag=true;lx=e.clientX;ly=e.clientY;}});
rc.addEventListener('mouseup',()=>drag=false);
rc.addEventListener('mouseleave',()=>drag=false);
rc.addEventListener('mousemove',e=>{
  if(!drag)return;
  pivTY+=(e.clientX-lx)*.006;pivTX+=(e.clientY-ly)*.004;
  pivTX=Math.max(-Math.PI/3,Math.min(Math.PI/3,pivTX));
  lx=e.clientX;ly=e.clientY;autoRot=false;
});
rc.addEventListener('wheel',e=>{
  zoom+=e.deltaY*.03;zoom=Math.max(12,Math.min(65,zoom));camTgt.z=zoom;e.preventDefault();
},{passive:false});
rc.addEventListener('touchstart',e=>{if(e.touches.length===1){drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;}},{passive:true});
rc.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&drag){pivTY+=(e.touches[0].clientX-lx)*.007;pivTX+=(e.touches[0].clientY-ly)*.005;lx=e.touches[0].clientX;ly=e.touches[0].clientY;autoRot=false;}
},{passive:true});
rc.addEventListener('touchend',()=>drag=false,{passive:true});

// ── CLICK ─────────────────────────────────────────────────────────
rc.addEventListener('click',e=>{
  if(drag)return;
  rc2.setFromCamera(mouse,cam);
  const bodies=orbs.map(o=>o.userData.body);
  const hits=rc2.intersectObjects(bodies);
  if(hits.length>0){const i=bodies.indexOf(hits[0].object);sel=i;flyTo(i);openPan(i);}
  else closePan();
});
rc.addEventListener('contextmenu',e=>{
  e.preventDefault();
  rc2.setFromCamera(mouse,cam);
  const bodies=orbs.map(o=>o.userData.body);
  const hits=rc2.intersectObjects(bodies);
  if(hits.length>0){
    const i=bodies.indexOf(hits[0].object);const s=SUBS[i];
    showCtx(e.clientX,e.clientY,[
      {l:s.sym+' '+s.name,f:()=>openPan(i)},
      {l:'🚀 Fly To',f:()=>flyTo(i)},
      {sep:true},
      {l:s.prog+'% mastered',f:()=>{}},
    ]);
  }else{
    showCtx(e.clientX,e.clientY,[
      {l:'⟳ Toggle Rotation',f:toggleRot},
      {l:'⊙ Reset View',f:resetCam},
      {sep:true},
      {l:'← Back to StudyOS',f:()=>location.href='index.html'},
    ]);
  }
});

// ── PANEL ─────────────────────────────────────────────────────────
function openPan(i){
  const s=SUBS[i];
  document.getElementById('p-sym').textContent=s.sym;
  document.getElementById('p-name').textContent=s.name;
  document.getElementById('p-meta').textContent=s.topics.length+' topics · '+s.prog+'% mastered';
  document.getElementById('p-bar').style.cssText=`width:${s.prog}%;background:${s.hex}`;
  document.getElementById('p-pct').textContent=s.prog+'%';
  document.getElementById('p-pct').style.color=s.hex;
  document.getElementById('p-top').textContent=s.topics.length;
  document.getElementById('pan-accent').style.background=s.hex;
  document.getElementById('p-chips').innerHTML=s.topics.map(t=>
    `<div class="chip" style="background:${s.hex}18;border:1px solid ${s.hex}30;color:${s.hex}">${t}</div>`
  ).join('');
  document.getElementById('p-go').style.background=s.hex;
  document.getElementById('pan').classList.add('open');
}
function closePan(){document.getElementById('pan').classList.remove('open');sel=null;resetCam();}

// ── CONTEXT MENU ──────────────────────────────────────────────────
function showCtx(x,y,items){
  const m=document.getElementById('ctx');
  m.innerHTML=items.map(it=>it.sep?'<div class="ctx-sep"></div>'
    :`<div class="ctx-r" onclick="(${it.f.toString()})()">${it.l}</div>`).join('');
  m.style.left=Math.min(x,innerWidth-170)+'px';m.style.top=Math.min(y,innerHeight-160)+'px';
  m.classList.add('open');
  setTimeout(()=>document.addEventListener('click',()=>m.classList.remove('open'),{once:true}),40);
}

// ── ANIMATE LOOP ──────────────────────────────────────────────────
const clk=new THREE.Clock();
let pulse=0;

function animate(){
  requestAnimationFrame(animate);
  const t=clk.getElapsedTime();

  // Core breathe
  pulse=Math.sin(t*1.6)*.5+.5;
  coreMesh.rotation.y=t*.1;coreWire.rotation.y=-t*.07;coreWire.rotation.x=t*.04;
  coreMesh.material.emissiveIntensity=1.0+pulse*.9;
  corePt.intensity=7+pulse*12;

  // Ring spins
  pivot.children.forEach(c=>{if(c.userData.rs)c.rotation.z+=c.userData.rs;});

  // Auto-rotate
  if(autoRot)pivTY+=.0013;
  pivY+=(pivTY-pivY)*.058;pivX+=(pivTX-pivX)*.058;
  pivot.rotation.y=pivY;pivot.rotation.x=pivX;

  // Camera spring
  cam.position.x+=(camTgt.x-cam.position.x)*.05;
  cam.position.y+=(camTgt.y-cam.position.y)*.05;
  cam.position.z+=(camTgt.z-cam.position.z)*.05;
  camLook.lerp(camLookTgt,.05);cam.lookAt(camLook);

  // Orbit subjects
  orbs.forEach((g,i)=>{
    const s=g.userData.s;
    g.userData.angle+=s.spd;
    const ang=g.userData.angle,tl=s.tilt*Math.PI/180;
    g.position.x=Math.cos(ang)*s.orbit;
    g.position.y=Math.sin(ang)*s.orbit*Math.sin(tl);
    g.position.z=Math.sin(ang)*s.orbit*Math.cos(tl);
    g.userData.body.rotation.y=t*.35*(i%2?-1:1);
    const ep=.75+Math.sin(t*1.9+i*1.1)*.28*(s.prog/100);
    g.userData.body.material.emissiveIntensity=g.userData.hovered?3.2:ep;
  });

  // Raycast
  rc2.setFromCamera(mouse,cam);
  const bodies=orbs.map(o=>o.userData.body);
  const hits=rc2.intersectObjects(bodies);
  const ttEl=document.getElementById('tt');
  if(hits.length>0&&!drag){
    const i=bodies.indexOf(hits[0].object);const g=orbs[i];const s=g.userData.s;
    if(hov!==g){if(hov)hov.userData.hovered=false;hov=g;hov.userData.hovered=true;document.body.style.cursor='pointer';}
    document.getElementById('tt-sym').textContent=s.sym;
    document.getElementById('tt-name').textContent=s.name;
    document.getElementById('tt-pct').textContent=s.prog+'% mastered · '+s.topics.length+' topics';
    document.getElementById('tt-pct').style.color=s.hex;
    ttEl.classList.add('on');
    g.scale.lerp(new THREE.Vector3(1.18,1.18,1.18),.12);
  }else{
    if(hov){hov.userData.hovered=false;hov=null;document.body.style.cursor='default';}
    ttEl.classList.remove('on');
    orbs.forEach(g=>g.scale.lerp(new THREE.Vector3(1,1,1),.1));
  }

  // Update connections
  conns.forEach(({mesh,curve,a,b})=>{
    const pa=new THREE.Vector3();orbs[a].getWorldPosition(pa);
    const pb=new THREE.Vector3();orbs[b].getWorldPosition(pb);
    const mid=pa.clone().add(pb).multiplyScalar(.5).multiplyScalar(.32);
    curve.points[0].copy(pa);curve.points[1].copy(mid);curve.points[2].copy(pb);
    const ng=new THREE.TubeGeometry(curve,20,.014,5,false);
    mesh.geometry.dispose();mesh.geometry=ng;
    mesh.material.opacity=.1+pulse*.11;
  });

  // Project 3D labels to 2D screen
  orbs.forEach((g,i)=>{
    g.getWorldPosition(_pr2);
    _pr2.project(cam);
    const sx=(_pr2.x*.5+.5)*innerWidth;
    const sy=(-_pr2.y*.5+.5)*innerHeight;
    const el=lbls[i];
    if(_pr2.z<1){
      el.style.left=sx+'px';
      el.style.top=sy+'px'; // CSS handles translate(-50%, -100% - 14px)
      const dm=g.position.length()/SUBS[i].orbit;
      el.style.opacity=String(Math.max(0,Math.min(.9,(60-g.position.length())/30)));
      el.style.display='';
    }else{
      el.style.display='none';
    }
  });

  renderer.render(scene,cam);
}
animate();

// ── KEYBOARD ──────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closePan();
  if(e.key==='r'||e.key==='R')resetCam();
  if(e.key==='a'||e.key==='A')toggleRot();
});
window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);
});

// ── HIDE LOADING ──────────────────────────────────────────────────
setTimeout(()=>{
  const ld=document.getElementById('loading');
  ld.classList.add('out');
  setTimeout(()=>ld.remove(),950);
},2400);
</script>
</body>
