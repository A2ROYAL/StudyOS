<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Galaxy ✦ Knowledge Nebula</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#010308;
  font-family:'Inter','Segoe UI',system-ui,sans-serif;color:#fff}

/* ── NEBULA ──────────────────────────────────────── */
#nebula{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 70%, rgba(128,82,255,.20) 0%,transparent 55%),
    radial-gradient(ellipse 55% 65% at 80% 25%, rgba(0,212,255,.13) 0%,transparent 55%),
    radial-gradient(ellipse 45% 40% at 55% 85%, rgba(255,107,138,.09) 0%,transparent 55%),
    radial-gradient(ellipse 40% 55% at 35% 10%, rgba(255,184,41,.06) 0%,transparent 55%),
    #010308;
  filter:blur(50px);
  animation:nebDrift 24s ease-in-out infinite alternate;
}
@keyframes nebDrift{
  0%  {opacity:.60;transform:scale(1)   rotate(0deg)}
  50% {opacity:.88;transform:scale(1.06)rotate(.8deg)}
  100%{opacity:.68;transform:scale(1.02)rotate(-.5deg)}
}

/* ── CANVAS ──────────────────────────────────────── */
#gx{position:fixed;inset:0;z-index:2}

/* ── FLOATING LABELS ─────────────────────────────── */
#labels{position:fixed;inset:0;z-index:4;pointer-events:none}
.lbl{
  position:absolute;pointer-events:all;
  transform:translate(-50%,calc(-100% - 14px));
  background:rgba(4,6,20,.80);backdrop-filter:blur(16px) saturate(1.5);
  border:1px solid rgba(255,255,255,.10);border-radius:12px;
  padding:7px 14px 8px;cursor:pointer;text-align:center;min-width:88px;
  transition:transform .25s cubic-bezier(.34,1.56,.64,1),
             box-shadow .2s ease, border-color .2s ease,opacity .3s ease;
  will-change:transform,left,top;
}
.lbl:hover{
  transform:translate(-50%,calc(-100% - 19px)) scale(1.07);
  box-shadow:0 8px 28px rgba(0,0,0,.45);
}
.lbl-name{font-size:11px;font-weight:700;letter-spacing:.02em}
.lbl-pct{font-size:10px;font-weight:500;opacity:.68;margin-top:2px}
.lbl-bar{height:2px;background:rgba(255,255,255,.08);border-radius:1px;margin-top:5px;overflow:hidden}
.lbl-fill{height:100%;border-radius:1px}

/* ── HUD ─────────────────────────────────────────── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:flex;align-items:center;padding:14px 22px;gap:10px;
  background:linear-gradient(180deg,rgba(1,3,8,.88) 0%,transparent);
  pointer-events:none;
}
.hd-logo{display:flex;align-items:center;gap:9px;pointer-events:all;text-decoration:none}
.hd-gem{
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,#8052ff,#00d4ff);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  box-shadow:0 0 18px rgba(128,82,255,.5);
}
.hd-ttl{font-size:15px;font-weight:800;letter-spacing:-.01em}
.hd-sub{font-size:9px;color:rgba(255,255,255,.32);font-weight:500;letter-spacing:.07em;text-transform:uppercase;margin-top:1px}
.hd-sp{flex:1}
.hd-pills{display:flex;gap:7px;pointer-events:all}
.pill{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.05);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.09);border-radius:9999px;
  color:rgba(255,255,255,.60);padding:7px 16px;cursor:pointer;
  font-size:11px;font-weight:500;font-family:inherit;text-decoration:none;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
}
.pill:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.22);transform:translateY(-2px)}
.pill:active{transform:scale(.95)}

/* ── TOOLTIP ─────────────────────────────────────── */
#tt{
  position:fixed;pointer-events:none;z-index:25;
  opacity:0;transition:opacity .15s ease;
  transform:translate(-50%,-145%);
  background:rgba(6,10,26,.94);backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.12);border-radius:16px;
  padding:12px 18px;min-width:136px;text-align:center;
  box-shadow:0 18px 50px rgba(0,0,0,.55);
}
#tt.on{opacity:1}
#tt-sym{font-size:28px;margin-bottom:5px;display:block}
#tt-name{font-size:13px;font-weight:700}
#tt-pct{font-size:10px;display:block;margin-top:3px;opacity:.65}
#tt-hint{font-size:9px;color:rgba(255,255,255,.25);margin-top:8px;display:block;letter-spacing:.05em}

/* ── PANEL ───────────────────────────────────────── */
#pan{
  position:fixed;right:0;top:0;bottom:0;width:290px;z-index:30;
  background:rgba(4,7,22,.97);backdrop-filter:blur(32px);
  border-left:1px solid rgba(255,255,255,.06);
  transform:translateX(100%);transition:transform .36s cubic-bezier(0,.9,.2,1);
  display:flex;flex-direction:column;
}
#pan.open{transform:translateX(0)}
#p-accent{height:3px;flex-shrink:0}
.pan-hdr{padding:22px 20px 16px}
.pan-sym{font-size:32px;margin-bottom:8px;display:block}
.pan-name{font-size:21px;font-weight:800;letter-spacing:-.02em}
.pan-meta{font-size:11px;color:rgba(255,255,255,.35);margin-top:4px}
.pan-x{
  position:absolute;top:18px;right:16px;
  width:28px;height:28px;background:rgba(255,255,255,.07);
  border:none;border-radius:50%;color:rgba(255,255,255,.5);
  font-size:13px;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s ease;
}
.pan-x:hover{background:rgba(255,255,255,.15);color:#fff}
.pan-body{flex:1;overflow-y:auto;padding:0 20px 22px;scrollbar-width:none}
.pan-body::-webkit-scrollbar{display:none}
.sec-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:rgba(255,255,255,.26);margin-bottom:8px;margin-top:20px}
.prg-track{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin-bottom:18px}
.prg-bar{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.34,1.56,.64,1)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:14px;text-align:center}
.stat-n{font-size:26px;font-weight:800;letter-spacing:-.03em}
.stat-l{font-size:9px;color:rgba(255,255,255,.30);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-top:4px}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px}
.chip{padding:5px 11px;border-radius:9999px;font-size:11px;font-weight:600;cursor:default;
  transition:transform .18s cubic-bezier(.34,1.56,.64,1)}
.chip:hover{transform:translateY(-2px) scale(1.06)}
.btn-go{width:100%;padding:13px;border-radius:12px;border:none;font-family:inherit;
  font-size:14px;font-weight:700;color:#fff;cursor:pointer;letter-spacing:.01em;
  transition:all .22s cubic-bezier(.34,1.56,.64,1)}
.btn-go:hover{transform:translateY(-2px);filter:brightness(1.18);box-shadow:0 10px 28px rgba(0,0,0,.4)}
.btn-go:active{transform:scale(.97)}

/* ── CONTEXT MENU ────────────────────────────────── */
#ctx{
  position:fixed;z-index:50;
  background:rgba(8,12,32,.97);backdrop-filter:blur(22px);
  border:1px solid rgba(255,255,255,.13);border-radius:13px;
  padding:6px;min-width:160px;box-shadow:0 20px 60px rgba(0,0,0,.65);
  opacity:0;pointer-events:none;
  transform:scale(.86) translateY(-6px);
  transition:all .16s cubic-bezier(.34,1.56,.64,1);
}
#ctx.open{opacity:1;pointer-events:all;transform:scale(1) translateY(0)}
.ctx-r{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:8px;
  cursor:pointer;font-size:12px;color:rgba(255,255,255,.80);transition:background .1s ease}
.ctx-r:hover{background:rgba(128,82,255,.22);color:#fff}
.ctx-sep{height:1px;background:rgba(255,255,255,.07);margin:4px 0}

/* ── HINT BAR ────────────────────────────────────── */
#hints{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;gap:14px;
  background:rgba(1,3,8,.70);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.07);border-radius:9999px;
  padding:9px 22px;pointer-events:none;
}
.hk{font-size:10px;color:rgba(255,255,255,.36);display:flex;align-items:center;gap:5px}
.hk kbd{background:rgba(255,255,255,.09);color:rgba(255,255,255,.52);
  border-radius:4px;padding:1px 6px;font-family:inherit;font-size:9px}

/* ── LOADING ─────────────────────────────────────── */
#loading{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  background:radial-gradient(ellipse 70% 60% at 50% 50%, rgba(128,82,255,.14) 0%,#010308 62%);
  transition:opacity .85s ease;
}
#loading.out{opacity:0;pointer-events:none}
.ld-gem{
  width:68px;height:68px;border-radius:20px;
  background:linear-gradient(135deg,#8052ff,#00d4ff);
  display:flex;align-items:center;justify-content:center;font-size:28px;
  animation:ldPulse 1.9s ease-in-out infinite;
}
@keyframes ldPulse{
  0%,100%{box-shadow:0 0 28px rgba(128,82,255,.4)}
  50%{box-shadow:0 0 68px rgba(128,82,255,.85),0 0 100px rgba(0,212,255,.25)}
}
.ld-title{font-size:18px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}
.ld-sub{font-size:11px;color:rgba(255,255,255,.28);letter-spacing:.07em}
.ld-bar{width:200px;height:2px;background:rgba(255,255,255,.07);border-radius:1px;overflow:hidden}
.ld-fill{height:100%;background:linear-gradient(90deg,#8052ff,#00d4ff,#15e8a0);
  animation:ldFill 2.3s cubic-bezier(.4,0,.2,1) forwards}
@keyframes ldFill{from{width:0}to{width:100%}}
</style>
</head>
<body>

<div id="nebula"></div>
<div id="labels"></div>
<canvas id="gx"></canvas>

<!-- TOOLTIP -->
<div id="tt">
  <span id="tt-sym">∑</span>
  <span id="tt-name">Mathematics</span>
  <span id="tt-pct">65% · 6 topics</span>
  <span id="tt-hint">CLICK TO OPEN · RIGHT-CLICK FOR MENU</span>
</div>

<!-- HUD -->
<div id="hud">
  <a href="index.html" class="hd-logo">
    <div class="hd-gem">✦</div>
    <div>
      <div class="hd-ttl">Study Galaxy</div>
      <div class="hd-sub">Knowledge Nebula</div>
    </div>
  </a>
  <div class="hd-sp"></div>
  <div class="hd-pills">
    <button class="pill" id="rot-btn" onclick="toggleRot()">⟳ Auto-Rotate</button>
    <button class="pill" onclick="resetCam()">⊙ Reset</button>
    <a href="index.html" class="pill">← StudyOS</a>
  </div>
</div>

<!-- PANEL -->
<div id="pan">
  <div id="p-accent"></div>
  <button class="pan-x" onclick="closePan()">✕</button>
  <div class="pan-hdr">
    <span class="pan-sym" id="p-sym">∑</span>
    <div class="pan-name" id="p-name">Mathematics</div>
    <div class="pan-meta" id="p-meta">6 topics · 65% mastered</div>
  </div>
  <div class="pan-body">
    <div class="sec-lbl">Mastery Progress</div>
    <div class="prg-track"><div class="prg-bar" id="p-bar"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-n" id="p-pct" style="color:#8052ff">65%</div><div class="stat-l">Mastered</div></div>
      <div class="stat"><div class="stat-n" id="p-top">6</div><div class="stat-l">Topics</div></div>
    </div>
    <div class="sec-lbl">Topics</div>
    <div class="chips" id="p-chips"></div>
    <button class="btn-go" id="p-go" onclick="location.href='index.html'">Open in StudyOS →</button>
  </div>
</div>

<!-- CONTEXT MENU -->
<div id="ctx"></div>

<!-- HINTS -->
<div id="hints">
  <div class="hk"><kbd>Drag</kbd> Rotate</div>
  <div class="hk"><kbd>Scroll</kbd> Zoom</div>
  <div class="hk"><kbd>Click</kbd> Explore</div>
  <div class="hk"><kbd>R</kbd> Reset</div>
  <div class="hk"><kbd>Esc</kbd> Close</div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="ld-gem">🌌</div>
  <div class="ld-title">Study Galaxy</div>
  <div class="ld-sub">Mapping your Knowledge Nebula…</div>
  <div class="ld-bar"><div class="ld-fill"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── DATA (synced live with StudyOS localStorage) ──────────────────
const GCAT={
  m:{name:'Mathematics',sym:'∑',hex:'#8052ff',tp:['Algebra','Calculus','Geometry','Trigonometry','Statistics','Probability']},
  p:{name:'Physics',sym:'φ',hex:'#00d4ff',tp:['Mechanics','Thermodynamics','Electromagnetism','Optics','Waves','Modern Physics']},
  c:{name:'Chemistry',sym:'⚗',hex:'#ffb829',tp:['Organic','Inorganic','Physical','Bonding','Electrochemistry','Thermochem']},
  b:{name:'Biology',sym:'⬡',hex:'#15e8a0',tp:['Cell Biology','Genetics','Ecology','Evolution','Physiology','Botany']},
  e:{name:'English',sym:'A',hex:'#b8b8ff',tp:['Grammar','Literature','Writing','Comprehension','Vocabulary','Poetry']},
  h:{name:'History',sym:'⚔',hex:'#ff6b8a',tp:['Ancient','Medieval','Modern','World Wars','Revolutions','Contemporary']},
  g:{name:'Geography',sym:'⊕',hex:'#4dd8a8',tp:['Physical','Human','Maps','Climate','Economic','Environment']},
  cs:{name:'Computer Sci',sym:'⌨',hex:'#39c5ff',tp:['Programming','Data Structures','Algorithms','Databases','Networks','AI']},
  ec:{name:'Economics',sym:'$',hex:'#f5b942',tp:['Micro','Macro','Trade','Money','Markets','Development']},
  s:{name:'General Science',sym:'⚛',hex:'#9b7bff',tp:['Matter','Energy','Life','Earth','Space','Method']},
  lit:{name:'Literature',sym:'📖',hex:'#ff9ab0',tp:['Prose','Poetry','Drama','Criticism','Authors','Themes']},
  fl:{name:'Foreign Language',sym:'🗣',hex:'#7ad6ff',tp:['Vocabulary','Grammar','Speaking','Listening','Reading','Writing']},
  art:{name:'Art & Design',sym:'🎨',hex:'#ff8fb1',tp:['Drawing','Color','History','Composition','Media','Critique']},
  bus:{name:'Business',sym:'💼',hex:'#ffc14d',tp:['Management','Marketing','Finance','Strategy','HR','Operations']},
  psy:{name:'Psychology',sym:'🧠',hex:'#b79bff',tp:['Cognition','Development','Social','Clinical','Research','Biology']},
  civ:{name:'Civics / Politics',sym:'⚖',hex:'#ff7d9c',tp:['Government','Constitution','Rights','Law','Policy','Elections']},
  acc:{name:'Accountancy',sym:'🧮',hex:'#ffcf66',tp:['Ledgers','Statements','Costing','Audit','Tax','Ratios']},
  env:{name:'Environmental Sci',sym:'🌍',hex:'#3fd99a',tp:['Ecosystems','Pollution','Climate','Conservation','Resources','Policy']},
};
function hex2int(h){return parseInt(String(h).replace('#',''),16)||0x8052ff;}
function loadSubs(){
  let saved=[];
  try{
    const db=JSON.parse(localStorage.getItem('studyos_v1')||'{}');
    const sp=db.subProgress||{};
    saved=(db.subs||[]).map(s=>({id:s.id,p:(sp[s.id]!==undefined?sp[s.id]:s.p)||0}));
  }catch(e){}
  if(!saved.length){ // demo fallback so galaxy is never empty
    saved=[{id:'m',p:65},{id:'p',p:48},{id:'c',p:62},{id:'b',p:30},{id:'e',p:80},{id:'h',p:45}];
  }
  const tilts=[12,28,-18,38,-40,50,-30,22,-52,16,-24,44];
  const n=saved.length;
  return saved.map((sv,i)=>{
    const k=GCAT[sv.id]||{name:sv.id,sym:'•',hex:'#8052ff',tp:[]};
    return {
      id:sv.id,name:k.name,sym:k.sym,hex:k.hex,col:hex2int(k.hex),
      orbit:10+i*(16/Math.max(1,n)),
      spd:Math.max(.003,.0088-i*.0007),
      tilt:tilts[i%tilts.length],
      ph:(i/Math.max(1,n))*Math.PI*2,
      prog:Math.round(sv.p||0),
      topics:(k.tp&&k.tp.length)?k.tp:['Core','Practice','Review']
    };
  });
}
const SUBS=loadSubs();
const CONNS=[];
if(SUBS.length>1){for(let i=0;i<SUBS.length;i++){CONNS.push([i,(i+1)%SUBS.length]);if(i%2===0&&i+2<SUBS.length)CONNS.push([i,i+2]);}}

// ── CIRCLE SPRITE TEXTURE ─────────────────────────────────────────
function makeStarTex(size=64){
  const c=document.createElement('canvas');c.width=c.height=size;
  const ctx=c.getContext('2d');
  const g=ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0,'rgba(255,255,255,1)');
  g.addColorStop(.45,'rgba(255,255,255,.7)');
  g.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(c);
}
const STAR_TEX=makeStarTex();

// ── RENDERER ──────────────────────────────────────────────────────
const canvas=document.getElementById('gx');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:false});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setClearColor(0x010308,1);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.4;

// ── SCENE / CAMERA ────────────────────────────────────────────────
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x010308,.0048);

const cam=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,.1,900);
cam.position.set(0,7,38);

const pivot=new THREE.Group();
scene.add(pivot);

// ── LIGHTS ────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x080820,3));
const coreLight=new THREE.PointLight(0xffffff,10,50);scene.add(coreLight);
const rimA=new THREE.DirectionalLight(0x8052ff,2.6);rimA.position.set(-24,16,-10);scene.add(rimA);
const rimB=new THREE.DirectionalLight(0x00d4ff,1.8);rimB.position.set(24,-5,16);scene.add(rimB);

// ── STAR LAYERS (4 layers, all circular with canvas tex) ──────────
function mkStars(n,rMin,rMax,col,sz,op){
  const geo=new THREE.BufferGeometry();
  const pos=new Float32Array(n*3);
  for(let i=0;i<n;i++){
    const r=rMin+Math.random()*(rMax-rMin);
    const th=Math.random()*Math.PI*2;
    const ph=Math.acos(2*Math.random()-1);
    pos[i*3]=r*Math.sin(ph)*Math.cos(th);
    pos[i*3+1]=r*Math.sin(ph)*Math.sin(th);
    pos[i*3+2]=r*Math.cos(ph);
  }
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  const mat=new THREE.PointsMaterial({
    map:STAR_TEX,alphaTest:.02,
    color:col,size:sz,sizeAttenuation:true,
    transparent:true,opacity:op,
    blending:THREE.AdditiveBlending,depthWrite:false
  });
  return new THREE.Points(geo,mat);
}
// Distant stars — small, no size issues
scene.add(mkStars(7000,120,500,0xffffff,.18,.85));
scene.add(mkStars(2500, 60,200,0xaaaaff,.28,.50));
scene.add(mkStars(1000, 40,110,0x6655dd,.38,.32));
scene.add(mkStars( 200, 28, 70,0x00aaff,.50,.22));
// NO near-camera layer (was causing huge squares)

// ── CORE ──────────────────────────────────────────────────────────
const coreMat=new THREE.MeshStandardMaterial({
  color:0x4811aa,emissive:0x6022cc,emissiveIntensity:1.5,
  metalness:.85,roughness:.08
});
const coreMesh=new THREE.Mesh(new THREE.IcosahedronGeometry(2.0,5),coreMat);
pivot.add(coreMesh);

// Wireframe shell
const wireShell=new THREE.Mesh(
  new THREE.IcosahedronGeometry(2.22,1),
  new THREE.MeshBasicMaterial({color:0xaa88ff,wireframe:true,transparent:true,opacity:.13})
);
pivot.add(wireShell);

// Core glow (2 layers only, no back-side artifacts)
[{r:4.5,op:.06},{r:7,op:.03}].forEach(({r,op})=>{
  const g=new THREE.Mesh(new THREE.SphereGeometry(r,14,14),
    new THREE.MeshBasicMaterial({color:0x8052ff,transparent:true,opacity:op,
    blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide}));
  g.raycast=()=>{};pivot.add(g);
});

// Core orbital rings (small, contained)
[[2.8,.4,0,.0055],[3.8,1.1,1,-.0072]].forEach(([r,rx,i,rs])=>{
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(r,.018,7,80),
    new THREE.MeshBasicMaterial({color:[0x8052ff,0x00d4ff][i],
    transparent:true,opacity:[.35,.20][i],blending:THREE.AdditiveBlending,depthWrite:false})
  );
  ring.rotation.x=rx;ring.userData.rs=rs;ring.raycast=()=>{};
  pivot.add(ring);
});

// ── ORBIT TRAILS (subtle, no huge torus) ─────────────────────────
SUBS.forEach(s=>{
  // Use a dashed ring approach — just a thin torus scaled to orbit
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(s.orbit,.012,5,100),
    new THREE.MeshBasicMaterial({color:s.col,transparent:true,opacity:.06,
    blending:THREE.AdditiveBlending,depthWrite:false})
  );
  ring.rotation.x=s.tilt*Math.PI/180;
  ring.raycast=()=>{};
  pivot.add(ring);
});

// ── SUBJECT ORBS ──────────────────────────────────────────────────
const orbs=[];
const _wpos=new THREE.Vector3();

SUBS.forEach((s,i)=>{
  const grp=new THREE.Group();
  grp.userData={s,i,angle:s.ph,hov:false};

  // Main sphere (the only raycasting target)
  const body=new THREE.Mesh(
    new THREE.SphereGeometry(.82,32,32),
    new THREE.MeshStandardMaterial({
      color:s.col,emissive:s.col,emissiveIntensity:1.2,
      metalness:.22,roughness:.14
    })
  );
  grp.userData.body=body;
  grp.add(body);

  // Glow spheres — raycasting DISABLED
  [{r:1.5,op:.13},{r:2.3,op:.065},{r:3.5,op:.030}].forEach(({r,op})=>{
    const gm=new THREE.Mesh(new THREE.SphereGeometry(r,12,12),
      new THREE.MeshBasicMaterial({color:s.col,transparent:true,opacity:op,
      blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide}));
    gm.raycast=()=>{};grp.add(gm);
  });

  // Progress arc ring (partial torus = mastery arc)
  const arcA=Math.max(0.02,Math.PI*2*(s.prog/100));
  const arc=new THREE.Mesh(
    new THREE.TorusGeometry(1.15,.05,8,56,arcA),
    new THREE.MeshBasicMaterial({color:s.col,transparent:true,opacity:.85,
    blending:THREE.AdditiveBlending,depthWrite:false})
  );
  arc.rotation.x=Math.PI/2;arc.raycast=()=>{};grp.add(arc);

  // Background ring (full circle, dim)
  const bgRing=new THREE.Mesh(new THREE.TorusGeometry(1.15,.018,5,56),
    new THREE.MeshBasicMaterial({color:s.col,transparent:true,opacity:.12,
    blending:THREE.AdditiveBlending,depthWrite:false}));
  bgRing.rotation.x=Math.PI/2;bgRing.raycast=()=>{};grp.add(bgRing);

  // Point light
  const pl=new THREE.PointLight(s.col,1.6,11);grp.add(pl);

  // Particle dust cloud
  const dPos=new Float32Array(s.topics.length*8*3);
  for(let j=0;j<s.topics.length*8;j++){
    const r=1.9+Math.random()*.9,th=Math.random()*Math.PI*2,ph=Math.acos(2*Math.random()-1);
    dPos[j*3]=r*Math.sin(ph)*Math.cos(th);
    dPos[j*3+1]=r*Math.sin(ph)*Math.sin(th);
    dPos[j*3+2]=r*Math.cos(ph);
  }
  const dGeo=new THREE.BufferGeometry();
  dGeo.setAttribute('position',new THREE.BufferAttribute(dPos,3));
  const dust=new THREE.Points(dGeo,new THREE.PointsMaterial({
    map:STAR_TEX,alphaTest:.02,
    color:s.col,size:.07,sizeAttenuation:true,
    transparent:true,opacity:.50,
    blending:THREE.AdditiveBlending,depthWrite:false
  }));
  dust.raycast=()=>{};grp.add(dust);

  pivot.add(grp);
  orbs.push(grp);
});

// ── CSS LABELS ────────────────────────────────────────────────────
const labelEls=SUBS.map((s,i)=>{
  const el=document.createElement('div');
  el.className='lbl';
  el.style.borderColor=s.hex+'22';
  el.innerHTML=
    `<div class="lbl-name" style="color:${s.hex}">${s.name}</div>`+
    `<div class="lbl-pct">${s.prog}%</div>`+
    `<div class="lbl-bar"><div class="lbl-fill" style="width:${s.prog}%;background:${s.hex}"></div></div>`;
  el.onclick=()=>{openPan(i);flyTo(i);}
  document.getElementById('labels').appendChild(el);
  return el;
});

// ── CONNECTION LINES ──────────────────────────────────────────────
const connMeshes=CONNS.map(([a,b])=>{
  const curve=new THREE.CatmullRomCurve3([
    new THREE.Vector3(),new THREE.Vector3(),new THREE.Vector3()
  ]);
  const mesh=new THREE.Mesh(
    new THREE.TubeGeometry(curve,18,.012,4,false),
    new THREE.MeshBasicMaterial({color:0x8052ff,transparent:true,opacity:.15,
    blending:THREE.AdditiveBlending,depthWrite:false})
  );
  mesh.raycast=()=>{};
  pivot.add(mesh);
  return{mesh,curve,a,b};
});

// ── CAMERA STATE ──────────────────────────────────────────────────
let camTX=0,camTY=8,camTZ=38;
const camLook=new THREE.Vector3();
const camLookTgt=new THREE.Vector3();
let autoRot=true,pivTY=0,pivTX=0,pivY=0,pivX=0,zoomTgt=38;

function flyTo(i){
  const g=orbs[i];g.getWorldPosition(_wpos);
  const d=_wpos.clone().normalize().multiplyScalar(6);
  camTX=_wpos.x+d.x;camTY=_wpos.y+3;camTZ=_wpos.z+d.z;
  camLookTgt.copy(_wpos);autoRot=false;
}
function resetCam(){camTX=0;camTY=7;camTZ=38;zoomTgt=38;camLookTgt.set(0,0,0);autoRot=true;}
function toggleRot(){autoRot=!autoRot;showToast(autoRot?'Auto-rotate ON':'Paused');}

function showToast(msg){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;bottom:58px;left:50%;transform:translateX(-50%);'+
    'background:rgba(8,12,30,.92);backdrop-filter:blur(14px);'+
    'border:1px solid rgba(255,255,255,.10);border-radius:9999px;'+
    'padding:8px 20px;font-size:12px;color:#fff;z-index:60;pointer-events:none;'+
    'transition:opacity .3s ease;white-space:nowrap';
  el.textContent=msg;document.body.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';setTimeout(()=>el.remove(),350)},1900);
}

// ── RAYCASTING ────────────────────────────────────────────────────
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2(-999,-999);
let hovIdx=-1,selIdx=-1;

window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/innerWidth)*2-1;
  mouse.y=-(e.clientY/innerHeight)*2+1;
  const tt=document.getElementById('tt');
  tt.style.left=e.clientX+'px';tt.style.top=e.clientY+'px';
});

// ── DRAG ──────────────────────────────────────────────────────────
let dragging=false,lx=0,ly=0,didDrag=false;
canvas.addEventListener('mousedown',e=>{if(e.button===0){dragging=true;lx=e.clientX;ly=e.clientY;didDrag=false;}});
window.addEventListener('mouseup',()=>{dragging=false;});
canvas.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const dx=e.clientX-lx,dy=e.clientY-ly;
  if(Math.abs(dx)>3||Math.abs(dy)>3)didDrag=true;
  pivTY+=dx*.0055;pivTX+=dy*.0038;
  pivTX=Math.max(-Math.PI*.35,Math.min(Math.PI*.35,pivTX));
  lx=e.clientX;ly=e.clientY;autoRot=false;
});
canvas.addEventListener('wheel',e=>{
  zoomTgt+=e.deltaY*.028;zoomTgt=Math.max(14,Math.min(60,zoomTgt));e.preventDefault();
},{passive:false});

// Touch
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{if(e.touches.length===1){dragging=true;tx=e.touches[0].clientX;ty=e.touches[0].clientY;didDrag=false;}},{passive:true});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&dragging){
    const dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
    if(Math.abs(dx)>3||Math.abs(dy)>3)didDrag=true;
    pivTY+=dx*.006;pivTX+=dy*.004;
    tx=e.touches[0].clientX;ty=e.touches[0].clientY;autoRot=false;
  }
},{passive:true});
canvas.addEventListener('touchend',()=>{dragging=false;},{passive:true});

// ── CLICK / RIGHT-CLICK ───────────────────────────────────────────
canvas.addEventListener('click',e=>{
  if(didDrag)return;
  const hi=getHoveredIdx();
  if(hi>=0){selIdx=hi;flyTo(hi);openPan(hi);}
  else{closePan();}
});
canvas.addEventListener('contextmenu',e=>{
  e.preventDefault();
  const hi=getHoveredIdx();
  if(hi>=0){
    const s=SUBS[hi];
    showCtx(e.clientX,e.clientY,[
      {l:`${s.sym}  ${s.name}`,fn:null},
      {sep:true},
      {l:'🔍  Explore',fn:()=>{flyTo(hi);openPan(hi);}},
      {l:`📊  ${s.prog}% mastered`,fn:null},
    ]);
  }else{
    showCtx(e.clientX,e.clientY,[
      {l:'⟳  Toggle Rotation',fn:toggleRot},
      {l:'⊙  Reset View',fn:resetCam},
      {sep:true},
      {l:'←  Back to StudyOS',fn:()=>location.href='index.html'},
    ]);
  }
});

function getHoveredIdx(){
  raycaster.setFromCamera(mouse,cam);
  const bodies=orbs.map(o=>o.userData.body);
  const hits=raycaster.intersectObjects(bodies,false);
  if(!hits.length)return -1;
  return bodies.indexOf(hits[0].object);
}

// ── PANEL ──────────────────────────────────────────────────────────
function openPan(i){
  const s=SUBS[i];
  document.getElementById('p-sym').textContent=s.sym;
  document.getElementById('p-name').textContent=s.name;
  document.getElementById('p-meta').textContent=`${s.topics.length} topics · ${s.prog}% mastered`;
  document.getElementById('p-bar').style.cssText=`width:${s.prog}%;background:${s.hex}`;
  const pn=document.getElementById('p-pct');pn.textContent=s.prog+'%';pn.style.color=s.hex;
  document.getElementById('p-top').textContent=s.topics.length;
  document.getElementById('p-accent').style.background=s.hex;
  document.getElementById('p-chips').innerHTML=s.topics.map(t=>
    `<div class="chip" style="background:${s.hex}18;border:1px solid ${s.hex}28;color:${s.hex}">${t}</div>`
  ).join('');
  document.getElementById('p-go').style.background=s.hex;
  document.getElementById('pan').classList.add('open');
}
function closePan(){
  document.getElementById('pan').classList.remove('open');
  selIdx=-1;resetCam();
}

// ── CONTEXT MENU ───────────────────────────────────────────────────
function showCtx(x,y,items){
  const el=document.getElementById('ctx');
  el.innerHTML='';
  items.forEach(it=>{
    if(it.sep){const d=document.createElement('div');d.className='ctx-sep';el.appendChild(d);return;}
    const r=document.createElement('div');r.className='ctx-r';r.textContent=it.l;
    if(it.fn){r.addEventListener('click',()=>{it.fn();el.classList.remove('open');});}
    else{r.style.opacity='.45';r.style.cursor='default';}
    el.appendChild(r);
  });
  el.style.left=Math.min(x,innerWidth-175)+'px';
  el.style.top=Math.min(y,innerHeight-170)+'px';
  el.classList.add('open');
  const close=()=>{el.classList.remove('open');document.removeEventListener('click',close);};
  setTimeout(()=>document.addEventListener('click',close),60);
}

// ── ANIMATION LOOP ─────────────────────────────────────────────────
const clock=new THREE.Clock();
const _proj=new THREE.Vector3();
const _s1=new THREE.Vector3(1,1,1);
const _s2=new THREE.Vector3(1.16,1.16,1.16);

function tick(){
  requestAnimationFrame(tick);
  const t=clock.getElapsedTime();
  const pulse=Math.sin(t*1.7)*.5+.5;

  // Core animation
  coreMesh.rotation.y=t*.09;
  wireShell.rotation.y=-t*.065;wireShell.rotation.x=t*.038;
  coreMat.emissiveIntensity=1.0+pulse*.85;
  coreLight.intensity=6+pulse*10;

  // Ring spins on core rings
  pivot.children.forEach(c=>{if(c.userData?.rs)c.rotation.z+=c.userData.rs;});

  // Auto-rotate pivot
  if(autoRot)pivTY+=.0012;
  pivY+=(pivTY-pivY)*.055;pivX+=(pivTX-pivX)*.055;
  pivot.rotation.y=pivY;pivot.rotation.x=pivX;

  // Camera spring toward target
  camTZ=zoomTgt;
  cam.position.x+=(camTX-cam.position.x)*.055;
  cam.position.y+=(camTY-cam.position.y)*.055;
  cam.position.z+=(camTZ-cam.position.z)*.055;
  camLook.lerp(camLookTgt,.055);
  cam.lookAt(camLook);

  // Orbit subjects
  orbs.forEach((grp,i)=>{
    const s=grp.userData.s;
    grp.userData.angle+=s.spd;
    const ang=grp.userData.angle;
    const tl=s.tilt*Math.PI/180;
    grp.position.x=Math.cos(ang)*s.orbit;
    grp.position.y=Math.sin(ang)*s.orbit*Math.sin(tl);
    grp.position.z=Math.sin(ang)*s.orbit*Math.cos(tl);
    grp.userData.body.rotation.y=t*.32*(i%2?-1:1);
    const ep=.7+Math.sin(t*1.8+i*1.05)*.3*(s.prog/100);
    grp.userData.body.material.emissiveIntensity=grp.userData.hov?2.8:ep;
  });

  // Hover detection (only body meshes)
  if(!dragging){
    const hi=getHoveredIdx();
    if(hi!==hovIdx){
      if(hovIdx>=0)orbs[hovIdx].userData.hov=false;
      hovIdx=hi;
      if(hovIdx>=0)orbs[hovIdx].userData.hov=true;
    }
    document.body.style.cursor=hi>=0?'pointer':'default';
    const ttEl=document.getElementById('tt');
    if(hi>=0){
      const s=SUBS[hi];
      document.getElementById('tt-sym').textContent=s.sym;
      document.getElementById('tt-name').textContent=s.name;
      const tp=document.getElementById('tt-pct');
      tp.textContent=`${s.prog}% mastered · ${s.topics.length} topics`;
      tp.style.color=s.hex;
      ttEl.classList.add('on');
    }else{
      ttEl.classList.remove('on');
    }
  }

  // Scale orbs
  orbs.forEach((grp,i)=>{
    const tgt=grp.userData.hov?_s2:_s1;
    grp.scale.lerp(tgt,.10);
  });

  // Update connection curves
  const pa=new THREE.Vector3(),pb=new THREE.Vector3();
  connMeshes.forEach(({mesh,curve,a,b})=>{
    orbs[a].getWorldPosition(pa);orbs[b].getWorldPosition(pb);
    const mid=pa.clone().add(pb).multiplyScalar(.5).multiplyScalar(.28);
    curve.points[0].copy(pa);curve.points[1].copy(mid);curve.points[2].copy(pb);
    const ng=new THREE.TubeGeometry(curve,18,.011,4,false);
    mesh.geometry.dispose();mesh.geometry=ng;
    mesh.material.opacity=.09+pulse*.10;
  });

  // Project labels to screen
  orbs.forEach((grp,i)=>{
    grp.getWorldPosition(_proj);
    const copy=_proj.clone();copy.project(cam);
    if(copy.z>=1){labelEls[i].style.display='none';return;}
    const sx=(copy.x*.5+.5)*innerWidth;
    const sy=(-copy.y*.5+.5)*innerHeight;
    const dist=grp.position.length();
    const op=Math.max(0,Math.min(.88,(50-dist)/25));
    labelEls[i].style.display='';
    labelEls[i].style.left=sx+'px';
    labelEls[i].style.top=sy+'px';
    labelEls[i].style.opacity=String(op);
  });

  renderer.render(scene,cam);
}
tick();

// ── KEYBOARD ──────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closePan();
  if(e.key==='r'||e.key==='R')resetCam();
  if(e.key==='a'||e.key==='A')toggleRot();
  if(e.key>='1'&&e.key<='9'){const i=+e.key-1;if(i<SUBS.length){flyTo(i);openPan(i);}}
});
window.addEventListener('resize',()=>{
  cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── HIDE LOADING ──────────────────────────────────────────────────
setTimeout(()=>{
  const ld=document.getElementById('loading');
  ld.classList.add('out');
  setTimeout(()=>ld.remove(),950);
},2200);
</script>
